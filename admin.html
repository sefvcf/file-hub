<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传文件 | 小猪的文件站</title>
<style>
  :root {
    --bg: #0a0a14; --surface: #151525; --card: #1e1e35;
    --text: #e2e2f0; --muted: #8888aa; --accent: #7c5cfc; --accent2: #a78bfa;
    --green: #34d399; --red: #f87171; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .container { width: 100%; max-width: 520px; }
  h1 {
    text-align: center; margin-bottom: 24px;
    background: linear-gradient(135deg, var(--accent2), #f093fb);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 24px; margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .card h3 { font-size: 1rem; margin-bottom: 14px; color: var(--accent2); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; }
  .form-group input[type="text"],
  .form-group input[type="password"] {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1); background: var(--surface);
    color: var(--text); font-size: 0.9rem; outline: none;
    transition: border-color 0.3s;
  }
  .form-group input:focus { border-color: var(--accent); }

  .file-drop {
    border: 2px dashed rgba(255,255,255,0.15); border-radius: var(--radius);
    padding: 32px; text-align: center; cursor: pointer; transition: all 0.3s;
    margin-bottom: 14px;
  }
  .file-drop:hover, .file-drop.drag-over { border-color: var(--accent); background: rgba(124,92,252,0.05); }
  .file-drop .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .file-drop p { color: var(--muted); font-size: 0.85rem; }
  .file-drop input { display: none; }

  .file-item {
    display: flex; align-items: center; gap: 10px; padding: 10px;
    background: var(--surface); border-radius: 8px; margin-bottom: 8px;
  }
  .file-item .name { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-item .size { font-size: 0.75rem; color: var(--muted); }
  .file-item .remove { color: var(--red); cursor: pointer; background: none; border: none; font-size: 1.1rem; }

  .btn {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    cursor: pointer; font-size: 0.95rem; font-weight: 600;
    transition: all 0.3s; margin-bottom: 8px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #6a4ce0; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }

  .progress-bar {
    width: 100%; height: 4px; background: var(--surface); border-radius: 2px;
    margin: 8px 0; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }

  .log { font-size: 0.78rem; color: var(--muted); max-height: 150px; overflow-y: auto; }
  .log .ok { color: var(--green); }
  .log .err { color: var(--red); }

  .back-link { text-align: center; margin-top: 16px; display: block; color: var(--accent2); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <h1>📤 上传文件</h1>

  <!-- Token 设置 -->
  <div class="card" id="tokenCard">
    <h3>🔑 GitHub Token</h3>
    <div class="form-group">
      <label>Personal Access Token（需 repo 权限）</label>
      <input type="password" id="tokenInput" placeholder="ghp_...">
    </div>
    <button class="btn btn-primary" onclick="saveToken()">保存 Token</button>
    <p style="font-size:0.72rem;color:var(--muted);margin-top:8px;">
      没有 Token？去 <a href="https://github.com/settings/tokens/new?scopes=repo&description=file-hub-upload" target="_blank" style="color:var(--accent2);">GitHub → Settings → Tokens</a> 创建一个（勾选 repo），仅存浏览器本地。
    </p>
  </div>

  <!-- 文件上传 -->
  <div class="card" id="uploadCard" style="display:none;">
    <h3>📁 选择文件上传</h3>

    <div class="file-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📂</div>
      <p>点击选择文件或拖拽到此处</p>
      <input type="file" id="fileInput" multiple onchange="addFiles(this.files)">
    </div>

    <div id="filePreview"></div>

    <button class="btn btn-primary" id="uploadBtn" onclick="uploadAll()" disabled>
      ⬆ 上传到 GitHub
    </button>
    <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    <div class="log" id="log"></div>
  </div>

  <a href="index.html" class="back-link">🔙 返回下载页</a>
</div>

<script>
const REPO_OWNER = 'sefvcf';
const REPO_NAME = 'file-hub';
const TOKEN_KEY = 'filehub_gh_token';

let selectedFiles = [];

// 初始化
if (sessionStorage.getItem(TOKEN_KEY)) {
  document.getElementById('tokenCard').style.display = 'none';
  document.getElementById('uploadCard').style.display = 'block';
}

function saveToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return alert('请输入 Token');
  sessionStorage.setItem(TOKEN_KEY, token);
  document.getElementById('tokenCard').style.display = 'none';
  document.getElementById('uploadCard').style.display = 'block';
}

function addFiles(fileList) {
  for (const f of fileList) {
    if (selectedFiles.find(sf => sf.name === f.name)) continue;
    selectedFiles.push(f);
  }
  renderFiles();
}

function removeFile(name) {
  selectedFiles = selectedFiles.filter(f => f.name !== name);
  renderFiles();
}

function renderFiles() {
  const btn = document.getElementById('uploadBtn');
  const preview = document.getElementById('filePreview');
  if (selectedFiles.length === 0) {
    preview.innerHTML = '';
    btn.disabled = true;
    return;
  }
  btn.disabled = false;
  preview.innerHTML = selectedFiles.map(f => `
    <div class="file-item">
      <span>📄</span>
      <span class="name">${f.name}</span>
      <span class="size">${(f.size / 1024 / 1024).toFixed(1)} MB</span>
      <button class="remove" onclick="removeFile('${f.name}')">✕</button>
    </div>
  `).join('');
}

// 拖拽上传
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

async function uploadAll() {
  const token = sessionStorage.getItem(TOKEN_KEY);
  if (!token) return alert('Token 丢失，请刷新页面重新输入');

  const log = document.getElementById('log');
  const bar = document.getElementById('progressBar');
  const btn = document.getElementById('uploadBtn');
  log.innerHTML = '';
  btn.disabled = true;

  let success = 0, fail = 0;
  for (let i = 0; i < selectedFiles.length; i++) {
    const file = selectedFiles[i];
    const pct = Math.round((i / selectedFiles.length) * 100);
    bar.style.width = pct + '%';
    log.innerHTML += `⏳ 上传中: ${file.name}...<br>`;

    try {
      const content = await fileToBase64(file);
      const resp = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/files/${encodeURIComponent(file.name)}`,
        {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: `上传 ${file.name}`,
            content: content,
            branch: 'main'
          })
        }
      );

      if (resp.status === 201 || resp.status === 200) {
        log.innerHTML += `<span class="ok">✅ ${file.name} 上传成功！</span><br>`;
        success++;
      } else if (resp.status === 422) {
        // 文件已存在，尝试更新
        const shaResp = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/files/${encodeURIComponent(file.name)}?ref=main`,
          { headers: { 'Authorization': `token ${token}` } }
        );
        const shaData = await shaResp.json();
        const retry = await fetch(
          `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/files/${encodeURIComponent(file.name)}`,
          {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: `更新 ${file.name}`,
              content: content,
              sha: shaData.sha,
              branch: 'main'
            })
          }
        );
        if (retry.ok) {
          log.innerHTML += `<span class="ok">✅ ${file.name} 更新成功！</span><br>`;
          success++;
        } else {
          log.innerHTML += `<span class="err">❌ ${file.name} 失败: ${retry.status}</span><br>`;
          fail++;
        }
      } else {
        log.innerHTML += `<span class="err">❌ ${file.name} 失败: ${resp.status} ${(await resp.json()).message}</span><br>`;
        fail++;
      }
    } catch (e) {
      log.innerHTML += `<span class="err">❌ ${file.name} 错误: ${e.message}</span><br>`;
      fail++;
    }
  }

  bar.style.width = '100%';
  btn.disabled = false;
  selectedFiles = [];
  renderFiles();
  log.innerHTML += `<br><b>完成！成功 ${success} 个，失败 ${fail} 个</b><br>`;
  log.innerHTML += `现在去 <a href="index.html" style="color:var(--accent2);">下载页</a> 就能看到新文件了（可能需要等30秒 Pages 刷新）`;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
